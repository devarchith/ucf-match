name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast-backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fast backend tests
        run: npm run test:fast

  db-critical-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ucf_match_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ucf_match_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ucf_match_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB-critical gate
        run: npm run test:gate:ci
