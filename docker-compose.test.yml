services:
  postgres-test:
    image: postgres:16
    container_name: ucf-match-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ucf_match_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ucf_match_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - ucf_match_postgres_test_data:/var/lib/postgresql/data

volumes:
  ucf_match_postgres_test_data:
